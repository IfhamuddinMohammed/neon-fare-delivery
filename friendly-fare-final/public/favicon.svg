<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0A0A0A"/>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- FF letters -->
  <text x="8" y="44" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#E8192C" filter="url(#glow)" letter-spacing="-2">FF</text>
  <!-- Glow underline -->
  <rect x="8" y="48" width="48" height="3" rx="1.5" fill="#E8192C" opacity="0.6"/>
  <!-- Gold dot -->
  <circle cx="54" cy="16" r="5" fill="#D4A017"/>
</svg>
